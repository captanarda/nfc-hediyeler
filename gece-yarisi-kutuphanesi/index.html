<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kütüphane // Olasılıksız</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-core: #0A0B10;
      --bg-surface: #12141D;
      --text-main: #E8E6E3;
      --text-muted: #8B8F98;
      --accent-gold: #C5A880;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'Inter', sans-serif;
      --ease-premium: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-core); color: var(--text-main);
      font-family: var(--font-sans); overflow-x: hidden; line-height: 1.6;
    }

    body::before {
      content: ""; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
      background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noise"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noise)"/%3E%3C/svg%3E');
      opacity: 0.015; pointer-events: none; z-index: 999; animation: grain 8s steps(10) infinite;
    }
    @keyframes grain { 0%, 100% { transform:translate(0, 0); } 50% { transform:translate(-5%, 5%); } }

    #introScene {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
      background-color: var(--bg-core); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 50; padding: 2rem; text-align: center;
      transition: transform 1.2s var(--ease-premium), opacity 1.2s var(--ease-premium);
    }
    .intro-quote {
      font-family: var(--font-serif); font-size: 2rem; font-weight: 300; font-style: italic;
      color: var(--text-main); max-width: 600px; opacity: 0; transform: translateY(20px);
      transition: opacity 1.5s var(--ease-premium), transform 1.5s var(--ease-premium);
    }
    .intro-quote.visible { opacity: 1; transform: translateY(0); }
    .btn-enter {
      margin-top: 3rem; background: transparent; border: 1px solid rgba(197, 168, 128, 0.4);
      color: var(--accent-gold); padding: 12px 32px; font-family: var(--font-sans);
      font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
      border-radius: 40px; cursor: pointer; opacity: 0; transition: all 0.5s ease;
    }
    .btn-enter:hover { background: rgba(197, 168, 128, 0.1); border-color: var(--accent-gold); }
    .btn-enter.visible { opacity: 1; }
    #introScene.hide { transform: translateY(-100vh); opacity: 0; pointer-events: none; }

    .audio-control {
      position: fixed; top: 2rem; right: 2rem; z-index: 100; display: flex; align-items: center;
      gap: 8px; cursor: pointer; opacity: 0; transition: opacity 1s ease;
    }
    .audio-control.visible { opacity: 1; }
    .audio-text { font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-muted); }
    .waves { display: flex; align-items: flex-end; gap: 2px; height: 12px; }
    .wave { width: 2px; height: 3px; background: var(--accent-gold); transition: height 0.3s; }
    .audio-control.playing .wave { animation: soundWave 0.8s ease-in-out infinite alternate; }
    .audio-control.playing .wave:nth-child(2) { animation-duration: 0.5s; }
    .audio-control.playing .wave:nth-child(3) { animation-duration: 0.7s; }
    @keyframes soundWave { 0% { height: 3px; } 100% { height: 12px; } }

    #mainContent { display: none; padding: 15vh 0; width: 100%; margin: 0 auto; overflow-x: hidden; }
    #mainContent.active { display: block; animation: fadeInContent 2s var(--ease-premium) forwards; }
    @keyframes fadeInContent { from { opacity: 0; } to { opacity: 1; } }
    .reveal { opacity: 0; transform: translateY(40px); transition: opacity 1s var(--ease-premium), transform 1s var(--ease-premium); }
    .reveal.active { opacity: 1; transform: translateY(0); }

    .book-header { text-align: center; margin-bottom: 6rem; padding: 0 2rem; }
    .book-title { font-family: var(--font-serif); font-size: 3.5rem; font-weight: 300; margin-bottom: 1rem; }
    .book-subtitle { font-size: 0.85rem; color: var(--accent-gold); letter-spacing: 0.15em; text-transform: uppercase; }

    .gallery-vertical {
      display: grid; grid-template-columns: 1fr; gap: 2rem; padding: 0 1.5rem; margin-bottom: 4rem; max-width: 1000px; margin-left: auto; margin-right: auto;
    }
    @media (min-width: 768px) { .gallery-vertical { grid-template-columns: 5.5fr 4.5fr; gap: 3rem; } }
    .photo-card { display: flex; flex-direction: column; }
    .photo-wrapper { overflow: hidden; border-radius: 4px; background-color: var(--bg-surface); margin-bottom: 1rem; }
    .photo-wrapper img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: grayscale(15%) contrast(110%) brightness(90%); transition: transform 1.5s var(--ease-premium);
    }
    .photo-wrapper:hover img { transform: scale(1.03); }
    .large-photo { height: 100%; } .large-photo img { aspect-ratio: 4/5; }
    .small-photos-container { display: flex; flex-direction: column; gap: 2rem; justify-content: space-between; }
    .small-photo img { aspect-ratio: 16/10; }
    .caption { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; border-top: 1px solid rgba(232, 230, 227, 0.1); padding-top: 0.8rem; }
    .caption-text { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
    .caption-meta { font-size: 0.65rem; color: var(--accent-gold); white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase; }
