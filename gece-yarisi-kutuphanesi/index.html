<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Senin Olduğun Hayat</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0b1020, #1d1230);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      max-width: 520px;
      padding: 32px;
      border-radius: 24px;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    h1 { font-size: 34px; }
    p { line-height: 1.7; font-size: 18px; }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      background: white;
      color: #111;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Merhaba sevgilim ❤️</h1>
    <p>
      Bu sayfayı açtıysan hediyenin gizli kısmına geldin.
      Burası sadece sana yazdığım küçük bir yer.
    </p>
    <a href="https://spotify.com">Şarkımızı dinle</a>
  </div>
</body>
</html>
