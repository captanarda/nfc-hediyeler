<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kütüphane // Odadakiler</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    /* A24 Sinematik Renk Paleti ve Temeller */
    :root {
      --bg-core: #0D0E12;       /* Gece yarısı karanlığı */
      --text-ivory: #E8E6E3;    /* Gözü yormayan soluk fildişi */
      --text-muted: #8A8E95;    /* Zamana yenik düşmüş gri */
      --accent-gold: #C5A880;   /* Loş kütüphane lambası tonu */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--bg-core);
      color: var(--text-ivory);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Film Greni (A24 Atmosferi İçin Canlı Doku) */
    body::before {
      content: "";
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="ns"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23ns)"/%3E%3C/svg%3E');
      opacity: 0.03;
      pointer-events: none;
      animation: grain 8s steps(10) infinite;
    }

    @keyframes grain {
      0%, 100% { transform:translate(0, 0); }
      50% { transform:translate(-5%, 5%); }
    }

    /* Minimalist Tasarım Kartı */
    .card {
      max-width: 480px;
      width: 100%;
      padding: 40px;
      border-radius: 4px; /* Yuvarlak köşeler yerine keskin ve lüks hatlar */
      background: rgba(22, 24, 32, 0.7);
      border: 1px solid rgba(197, 168, 128, 0.15); /* Çok hafif pirinç rengi çerçeve */
      backdrop-filter: blur(12px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
      text-align: left; /* Klişe merkez hizalama yerine edebi sol hizalama */
    }

    /* Kitap Başlığı (Serif Font) */
    h1 { 
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; 
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      line-height: 1.3;
    }

    /* Mektup Metni */
    p { 
      line-height: 1.8; 
      font-size: 15px; 
      color: var(--text-muted);
      font-weight: 300;
      margin-bottom: 32px;
    }

    /* Apple Tarzı Buton */
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: transparent;
      color: var(--accent-gold);
      border: 1px solid var(--accent-gold);
      border-radius: 2px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .btn:active {
      background: var(--accent-gold);
      color: var(--bg-core);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Gelecek, henüz yazılmamış olasılıklar kütüphanesidir.</h1>
    <p>
      Bu sayfayı açtıysan, fiziksel dünyanın sınırlarından sıyrılıp bu kitaba özel sakladığım hafıza odasına ulaştın. Aşağıdaki bağ, odanın sesini uyandıracak.
    </p>
    <a href="https://open.spotify.com/track/YOUR_TRACK_ID" class="btn" target="_blank">Şarkıyı Başlat</a>
  </div>

</body>
</html>
